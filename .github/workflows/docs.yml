name: Documentation contract
on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'scripts/docs.mjs'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'scripts/docs.mjs'
jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node scripts/docs.mjs check
